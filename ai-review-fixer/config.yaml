owner: aloekun

repos:
  # 空リスト = owner 配下の全リポジトリを対象にする
  # 特定のリポジトリのみを対象にするには名前を列挙する
  include: []

daemon:
  poll_interval_seconds: 60
  max_fix_attempts: 3
  workspace_dir: ../tmp/daemon-workspace
  # Phase 6.2: 2段階パッチ提案モード。Phase 6.1 の効果測定後に true に変更する。
  patch_proposal_mode: false

reviewer_bots:
  - "coderabbitai[bot]"
  - "chatgpt-codex-connector"
