name: Claude Review Fix

on:
  pull_request_review:
    types: [submitted]

jobs:
  fix:
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Fix
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "coderabbitai[bot]"

          prompt: |
            You are an autonomous code fixing agent.

            First gather context:

            1. Retrieve PR information
            2. Retrieve all review comments

            Use:

            gh pr view ${{ github.event.pull_request.number }} --comments

            Then:

            1. Identify issues raised by reviewers
            2. Locate affected files
            3. Implement minimal fixes
            4. Run tests
            5. Commit fixes

            Constraints:

            - Fix only issues mentioned in review
            - Do not modify unrelated code
            - Keep changes minimal

          claude_args: |
            --allowed-tools "Read,Edit,Glob,Grep,LS,Bash(git:*),Bash(gh pr:*),Bash(npm test:*)"

      - name: Upload Claude trace
        if: always() && steps.claude.outputs.execution_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution
          path: ${{ steps.claude.outputs.execution_file }}
          if-no-files-found: ignore
