name: Claude CI Fix

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  fix:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != 'main' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - name: Debug actor info
        run: |
          echo "github.actor=${{ github.actor }}"
          echo "workflow_run.actor=${{ github.event.workflow_run.actor.login }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Fix CI
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          prompt: |
            The CI workflow failed on branch `${{ github.event.workflow_run.head_branch }}`.

            IMPORTANT: This is a CI environment. Do NOT use pnpm or jj commands.
            Use git and gh directly for all VCS and GitHub operations.

            Step 1 - Identify which job failed:
            gh run view ${{ github.event.workflow_run.id }} --json jobs

            Step 2 - Get the failure logs:
            gh run view ${{ github.event.workflow_run.id }} --log-failed

            Step 3 - Fix and verify:
            1. Identify the TypeScript errors from the logs
            2. Fix the affected files
            3. Verify the fix with: npx --yes tsc --noEmit
            4. Commit and push using git directly:
               git add -A
               git commit -m "fix: <description>"
               git push

          additional_permissions: |
            actions: read

          claude_args: |
            --allowed-tools "Read,Edit,Glob,Grep,LS,Bash(git:*),Bash(gh run:*),Bash(gh pr:*),Bash(npx:*),Bash(npm:*)"

      - name: Upload Claude trace
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution
          path: ${{ steps.claude.outputs.execution_file }}
