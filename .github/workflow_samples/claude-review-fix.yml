name: Claude Review Fix

on:
  pull_request_review:
    types: [submitted]

jobs:
  fix:
    if: github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Fix
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "coderabbitai[bot]"

          prompt: |
            The PR received review comments requesting changes.
            Fix the issues mentioned in the review.

          claude_args: |
            --allowed-tools "Read,Edit,Glob,Grep,LS,Bash(git:*),Bash(gh pr:*),Bash(npm test:*)"