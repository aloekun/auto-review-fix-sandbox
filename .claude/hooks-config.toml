# hooks-config.toml — Python プロジェクト向けテンプレート

[pre_tool_validate]
blocked_patterns = [
  "default",
  "git",
  "jj-immutable",
  "jj-main-guard",
]

extra_protected_files = [
  ".claude/hooks-config.toml",
  "settings.local.json",
]

[post_tool_linter]

[[post_tool_linter.pipelines]]
extensions = ["py"]
steps = [
  { cmd = "ruff", args = ["check", "--fix", "{file}"], fix = true },
  { cmd = "ruff", args = ["format", "{file}"], fix = true },
  { cmd = "ruff", args = ["check", "{file}"], fix = false },
]

[stop_quality]
step_timeout = 120

[[stop_quality.steps]]
name = "lint"
cmd = "pnpm lint"

[[stop_quality.steps]]
name = "typecheck"
cmd = "pnpm typecheck"

[[stop_quality.steps]]
name = "test"
cmd = "pnpm test"
